name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python contract tests and React build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      APP_ENV: test
      DEBUG: "false"
      DATABASE_URL: sqlite:///./test_ci.sqlite3
      JWT_SECRET_KEY: ci-test-secret-not-for-production
      SUNO_API_KEY: test-suno-key
      GROQ_API_KEY: test-groq-key
      OPENAI_API_KEY: test-openai-key
      REPLICATE_API_TOKEN: test-replicate-token
      ACOUSTID_API_KEY: test-acoustid-key
      AUTH_COOKIE_SECURE: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system audio tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1 libchromaprint-tools

      - name: Install Python dependencies for offline contract tests
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install \
            fastapi==0.115.6 \
            "uvicorn[standard]==0.34.0" \
            sqlalchemy==2.0.36 \
            pydantic==2.10.4 \
            pydantic-settings==2.7.1 \
            httpx==0.28.1 \
            python-multipart==0.0.20 \
            python-dotenv==1.0.1 \
            alembic==1.14.0 \
            mutagen==1.47.0 \
            "passlib[bcrypt]==1.7.4" \
            bcrypt==4.0.1 \
            "python-jose[cryptography]==3.3.0" \
            pytest==8.3.4 \
            "requests>=2.32.0" \
            "replicate>=1.0.7"

      - name: Run offline Python contract tests
        run: |
          python -m pytest -q \
            tests/test_schema_request_models.py \
            tests/test_music_service_generate_payload.py \
            tests/test_frontend_source_regressions.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install React dependencies
        run: npm --prefix frontend-react ci

      - name: Build React frontend
        run: npm run build:react
